<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>StudyQuest | Login</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
</head>
<body class="theme-rpg rpg-sky">
    <!-- 雲たち -->
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>
    <div class="cloud cloud4"></div>
    <div class="cloud cloud5"></div>
    <header class="header container">
        <h1 class="logo">
            <a href="index.html">StudyQuest</a>
        </h1>
        <nav class="nav">
            <a href="login.html">Login</a>
            <a href="contact.html">Contact</a>
            <a href="customize.html">Customize</a>
        </nav>
    </header>
    <main class="container">
    <!-- ステータス -->
    <section class="status grid-2 contact-status">
        <div>
            <div id="now" class="status__now">--/-- --:--:--</div>
        </div>
        <!-- <div>
            <h2 class="h2">現在のEXP</h2>
            <div id="exp" class="status__exp">0</div>
            <p class="muted">200EXPでUn-lock</p>
        </div> -->
    </section>
    <section class="card login-card">
        <div id="loginFormArea">
            <form id="loginForm" class="login-form">
                <div class="field">
                    <p class="muted">Customize機能はログイン後に利用できます!</p>  
                    <label for="loginId">ID</label>
                    <input id="loginId" type="text" autocomplete="username" required />
                    <small class="error" data-error-for="loginId"></small>
                </div>
                <div class="field">
                    <label for="loginPw">Password</label>
                    <input id="loginPw" type="password" autocomplete="current-password" required />
                    <small class="error" data-error-for="loginPw"></small>
                </div>
                <button class="btn btn-accent" type="submit">ログイン</button>
                <p class="form-ok" id="loginOk" hidden>ログインしました！</p>
            </form>
        </div>
        <div id="loggedInArea" class="logged-in-area" hidden>
            <p class="login-done">ログイン済みです</p>
            <div class="login-actions">
                <a href="customize.html" class="btn btn-accent btn-logout">Customizeへ</a>
                <button id="logoutBtn" class="btn btn-logout" type="button">Logout</button>
            </div>
        </div>
    </section>
    </main>
    <footer class="footer">© 2025 StudyQuest. All rights reserved.</footer>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="main.js"></script>
    <div class="ground"></div>
</body>
</html>
