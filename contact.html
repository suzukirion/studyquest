<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>StudyQuest | Contact</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
</head>
<body class="theme-rpg rpg-sky">
    <!-- 雲たち -->
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>
    <div class="cloud cloud4"></div>
    <div class="cloud cloud5"></div>
    <header class="header container">
        <h1 class="logo">
            <a href="index.html">StudyQuest</a>
        </h1>
        <nav class="nav">
            <a href="login.html">Login</a>
            <a href="contact.html">Contact</a>
            <a href="customize.html">Customize</a>
        </nav>
    </header>
    <main class="container">
        <section class="status grid-2 contact-status">
            <div>
                <div id="now" class="status__now">--/-- --:--:--</div>
            </div>
        </section>
        <section class="card">
            <h2 class="h2">Contact</h2>
            <p class="muted">お問い合わせは下記フォームからお願いします。</p>

            <form id="contactForm" class="contact-form" method="POST" action="https://formspree.io/f/xzdagvln">
                <div class="field">
                    <label for="name">お名前 <span class="req">*</span></label>
                    <input id="name" name="name" type="text" autocomplete="name" required />
                    <small class="error" data-error-for="name"></small>
                </div>

                <div class="field">
                    <label for="email">メールアドレス <span class="req">*</span></label>
                    <input id="email" name="email" type="email" autocomplete="email" required />
                    <small class="error" data-error-for="email"></small>
                </div>

                <div class="field">
                    <label for="message">お問い合わせ内容 <span class="req">*</span></label>
                    <textarea id="message" name="message" rows="6" required></textarea>
                    <small class="error" data-error-for="message"></small>
                </div>
                <input type="hidden" name="_next" value="thanks.html">
                <button class="btn" type="submit">送信</button>

                <p id="formOk" class="form-ok" hidden>送信しました！ありがとうございます！</p>
            </form>
        </section>
    </main>
    <footer class="footer">© 2025 StudyQuest. All rights reserved.</footer>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="main.js"></script>
    <div class="ground"></div>
</body>
</html>
