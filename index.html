<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>StudyQuest</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">
</head>
<body class="theme-rpg rpg-sky">
    <!-- 雲たち -->
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>
    <div class="cloud cloud4"></div>
    <div class="cloud cloud5"></div>
    <header class="header container">
        <h1 class="logo">
            <a href="index.html">StudyQuest</a>
        </h1>
        <nav class="nav">
            <a href="login.html">Login</a>
            <a href="contact.html">Contact</a>
            <a href="customize.html">Customize</a>
        </nav>
        <div id="authArea" class="auth-area"></div>
    </header>
    <main class="container">
    <!-- ステータス -->
        <section class="status grid-2 contact-status">
            <div>
                <div id="now" class="status__now">--/-- --:--:--</div>
            </div>
            <!-- <div>
                <h2 class="h2">現在のEXP</h2>
                <div id="exp" class="status__exp">0</div>
                <p class="muted">200EXPでUn-lock</p>
            </div> -->
        </section>
    <!-- タイマー -->
        <section class="timer card">
            <!-- <label class="label">科目</label> -->
                <input id="subject" class="input" list="subjectList" placeholder="科目名を入力" autocomplete="off">
                <datalist id="subjectList"></datalist>
                </input>
            <div id="display" class="timer__display">00:00:00</div>
            <div class="btnrow">
                <button id="start" class="btn">スタート</button>
                <button id="stop"  class="btn">ストップ</button>
                <button id="reset" class="btn">リセット</button>
                <button id="save"  class="btn accent">保存</button>
            </div>
        </section>
    <!-- グラフ -->
        <section class="dash grid-2">
            <div class="card donut-card">
                <h3 class="h3">今日の学習内訳（科目別）</h3>
                <div class="chart-container">
                    <canvas id="chartDonut" height="220"></canvas>
                    <div id="donutMessage" class="donut-message">今日も勉強を始めよう！</div>
                </div>
                <div class="slime-container">

                    <p class="sub">合計：<span id="todayTotal">0h</span></p>
                </div>
            </div>
            <div class="card metrics" id="metricsCard">
                <div class="row-between">
                    <h3 class="h3">学習時間の推移</h3>
                    <div class="seg" role="radiogroup" aria-label="期間">
                        <button role="radio" aria-checked="true"  id="segWeek"  class="seg__btn is-active">週</button>
                        <button role="radio" aria-checked="false" id="segMonth" class="seg__btn">月</button>
                    </div>
                </div>
                <canvas id="chartBars" height="220"></canvas>
    <!-- 月間グラフ -->
                <div id="monthView">
                    <div class="cal-head">
                        <button id="prevMonth" aria-label="前の月">‹</button>
                        <h3 id="calTitle"></h3>
                        <button id="nextMonth" aria-label="次の月">›</button>
                    </div>
                    <div class="cal-grid" id="calGrid" aria-label="月間カレンダー"></div>
                </div>
            </div>
        </section>
    </main>
    <footer class="footer">© 2025 StudyQuest. All rights reserved.</footer>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="main.js"></script>
    <div class="ground"></div>
</body>
</html>
